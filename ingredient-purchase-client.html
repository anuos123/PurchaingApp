<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>采购系统-食材端</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
    .header { background: linear-gradient(135deg, #67C23A 0%, #85ce61 100%); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 20px; font-weight: bold; }
    .nav { display: flex; gap: 20px; }
    .nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 20px; transition: background 0.3s; }
    .nav a:hover { background: rgba(255,255,255,0.2); }
    .nav a.active { background: rgba(255,255,255,0.3); }
    .main { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .card-header { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #333; display: flex; justify-content: space-between; align-items: center; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.3s; }
    .btn-primary { background: #409EFF; color: white; }
    .btn-primary:hover { background: #67B8FF; }
    .btn-success { background: #67C23A; color: white; }
    .btn-success:hover { background: #85ce61; }
    .btn-warning { background: #E6A23C; color: white; }
    .btn-warning:hover { background: #f0c78a; }
    .btn-danger { background: #F56C6C; color: white; }
    .btn-danger:hover { background: #F78989; }
    .btn-default { background: #f0f0f0; color: #666; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 8px; padding: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .login-card { width: 400px; }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: white; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-card.green { border-left: 4px solid #67C23A; }
    .stat-card.blue { border-left: 4px solid #409EFF; }
    .stat-card.orange { border-left: 4px solid #E6A23C; }
    .stat-card.red { border-left: 4px solid #F56C6C; }
    .stat-value { font-size: 28px; font-weight: bold; color: #333; }
    .stat-label { font-size: 14px; color: #999; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">采购系统-食材端 <span style="font-size:12px; color:rgba(255,255,255,0.7); font-weight:normal;">v1.00</span></div>
    <div class="nav" id="nav">
      <a href="#ingredients" class="active" onclick="showTab('ingredients')">食材清单</a>
      <a href="#purchaseList" onclick="showTab('purchaseList')">采购任务</a>
      <a href="#purchaseHistory" onclick="showTab('purchaseHistory')">历史采购</a>
      <a href="#customers" onclick="showTab('customers')">客户名单</a>
    </div>
    <div class="user-info" id="userInfo">
      <span id="userName">用户</span>
    </div>
  </div>
  
  <div class="main">
    <div id="ingredientsTab">
      <div class="card">
        <div class="card-header">
          <span>食材清单</span>
          <div style="display:flex; gap:10px;">
            <button class="btn btn-primary" onclick="showAddIngredientModal()">添加食材</button>
            <button class="btn btn-success" onclick="exportIngredients()">导出Excel</button>
            <button class="btn btn-warning" onclick="showImportModal()">导入Excel</button>
          </div>
        </div>
        <div style="padding:15px;">
          <div style="margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <input type="text" id="ingredientSearch" placeholder="搜索食材..." style="padding:8px 12px; border:1px solid #ddd; border-radius:4px; width:200px; transition:border-color 0.3s;" oninput="filterIngredients()">
            <select id="ingredientCategory" style="padding:8px 12px; border:1px solid #ddd; border-radius:4px; transition:border-color 0.3s;" onchange="filterIngredients()">
              <option value="">全部分类</option>
              <option value="冻品">冻品</option>
              <option value="酱料">酱料</option>
              <option value="蔬菜">蔬菜</option>
              <option value="肉类">肉类</option>
            </select>
            <button class="btn btn-default" onclick="clearIngredientFilter()" style="padding:8px 16px;">清除筛选</button>
          </div>
          <div id="filterResult" style="margin-bottom:15px; font-size:13px; color:#666; display:none;"></div>
          <div id="ingredientsGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:15px;"></div>
        </div>
      </div>
    </div>

    <div id="purchaseListTab" style="display:none;">
      <div class="card">
        <div class="card-header">
          <span>采购任务</span>
          <button class="btn btn-success" onclick="showSelectIngredientModal()">从食材清单选择</button>
        </div>
        <div style="padding:15px;">
          <div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <input type="text" id="purchaseSearch" placeholder="搜索采购项..." style="padding:8px 12px; border:1px solid #ddd; border-radius:4px; width:200px;">
            <button class="btn btn-default" onclick="searchPurchases()">搜索</button>
            <button class="btn btn-danger" onclick="deleteAllPurchases()">一键清空全部</button>
          </div>
          <table style="width:100%; border-collapse:separate; border-spacing:0; border-radius:8px; overflow:hidden;">
            <thead>
              <tr style="background:#f8f9fa;">
                <th style="padding:12px 15px; text-align:center; font-weight:bold; border-bottom:1px solid #ddd; width:5%;"><input type="checkbox" id="selectAllPurchases" onchange="toggleSelectAllPurchases()"></th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:22%;">采购项名称</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:13%;">关联食材</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">数量</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">预估单价</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">总价</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:15%;">备注</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:15%;">操作</th>
              </tr>
            </thead>
            <tbody id="purchasesTable"></tbody>
          </table>
          <div id="purchaseSummary" style="margin-top:15px; padding:15px; background:#f8f9fa; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
            <span>总计：<strong id="purchaseTotalCount">0</strong> 项</span>
            <span>预估总价：<strong style="color:#E6A23C; font-size:18px;">¥<span id="purchaseTotalPrice">0.00</span></strong></span>
          </div>
        </div>
      </div>
      <button id="completePurchaseBtn" style="position:fixed; bottom:30px; right:30px; background:linear-gradient(135deg, #67C23A 0%, #85ce61 100%); color:white; border:none; border-radius:50px; padding:15px 30px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(103, 194, 58, 0.4); z-index:1000; transition:all 0.3s ease;" onclick="completeTodayPurchases()">
        ✓ 完成今日采购
      </button>
    </div>
    
    <div id="purchaseHistoryTab" style="display:none;">
      <div class="card">
        <div class="card-header">
          <span>历史采购</span>
          <div style="display:flex; gap:10px;">
            <select id="historyPeriod" style="padding:6px 10px; border:1px solid #ddd; border-radius:4px;">
              <option value="all">全部</option>
              <option value="today">最近当天</option>
              <option value="3days">最近3天</option>
              <option value="7days">最近7天</option>
              <option value="15days">最近15天</option>
              <option value="month">这个月</option>
            </select>
            <button class="btn btn-success" onclick="filterPurchaseHistory()">筛选</button>
            <button class="btn btn-default" onclick="clearHistoryFilter()">清除筛选</button>
          </div>
        </div>
        <div style="padding:15px;">
          <table style="width:100%; border-collapse:separate; border-spacing:0; border-radius:8px; overflow:hidden;">
            <thead>
              <tr style="background:#f8f9fa;">
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">记录ID</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:15%;">采购日期</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:20%;">采购项</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">数量</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:12%;">总金额</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:18%;">备注</th>
              </tr>
            </thead>
            <tbody id="purchaseHistoryTable"></tbody>
          </table>
          <div id="historySummary" style="margin-top:15px; padding:15px; background:#f8f9fa; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
            <span>总计采购记录：<strong id="historyTotalCount">0</strong> 条</span>
            <span>累计采购金额：<strong style="color:#67C23A; font-size:18px;">¥<span id="historyTotalAmount">0.00</span></strong></span>
          </div>
        </div>
      </div>
      <button id="clearHistoryBtn" style="position:fixed; bottom:30px; right:30px; background:linear-gradient(135deg, #F56C6C 0%, #f87171 100%); color:white; border:none; border-radius:50px; padding:15px 30px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(245, 108, 108, 0.4); z-index:1000; transition:all 0.3s ease;" onclick="clearAllPurchaseHistory()">
        🗑️ 一键清空历史
      </button>
    </div>
    
    <div id="customersTab" style="display:none;">
      <div class="card">
        <div class="card-header">
          <span>客户名单</span>
          <button class="btn btn-primary" onclick="showAddCustomerModal()">添加客户</button>
        </div>
        <div style="padding:15px;">
          <table style="width:100%; border-collapse:separate; border-spacing:0; border-radius:8px; overflow:hidden;">
            <thead>
              <tr style="background:#f8f9fa;">
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:7%;">客户ID</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:8%;">姓名</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">手机号</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:12%;">邮箱</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">微信/QQ</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:12%;">公司名称</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:18%;">单位地址</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:10%;">备注</th>
                <th style="padding:12px 15px; text-align:left; font-weight:bold; border-bottom:1px solid #ddd; width:13%;">操作</th>
              </tr>
            </thead>
            <tbody id="customersTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addIngredientModal">
    <div class="modal">
      <div class="modal-header">添加食材</div>
      <div style="padding:10px;">
        <div class="form-group">
          <label>食材名称</label>
          <input type="text" id="ingredientName" placeholder="请输入食材名称">
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="ingredientNewCategory">
            <option value="冻品">冻品</option>
            <option value="酱料">酱料</option>
            <option value="蔬菜">蔬菜</option>
            <option value="肉类">肉类</option>
          </select>
        </div>
        <div class="form-group">
          <label>规格</label>
          <input type="text" id="ingredientSpec" placeholder="例如：500g/份">
        </div>
        <div class="form-group">
          <label>预估单价</label>
          <input type="number" id="ingredientPrice" placeholder="请输入预估单价" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="ingredientNote" placeholder="请输入备注信息" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeAddIngredientModal()">取消</button>
        <button class="btn btn-primary" onclick="saveIngredientFromForm()">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="selectIngredientModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">从食材清单选择</div>
      <div style="max-height:400px; overflow-y:auto;">
        <div id="ingredientSelectList"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeSelectIngredientModal()">取消</button>
        <button class="btn btn-primary" onclick="addSelectedIngredients()">添加到采购任务</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="importModal">
    <div class="modal">
      <div class="modal-header">导入食材</div>
      <div style="padding:10px;">
        <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none;" onchange="handleFileSelect()">
        <button class="btn btn-primary" style="width:100%; padding:15px;" onclick="document.getElementById('importFile').click()">点击选择Excel文件</button>
        <div style="margin-top:15px; padding:15px; background:#f8f9fa; border-radius:4px;">
          <div style="font-size:12px; color:#666; margin-bottom:5px;">支持格式：.xlsx, .xls, .csv</div>
          <div style="font-size:12px; color:#666;">文件格式要求：第一行为表头（食材名称,分类,规格,预估单价,备注）</div>
        </div>
        <div id="importPreview" style="margin-top:15px; display:none;">
          <div style="font-weight:bold; margin-bottom:10px;">预览数据：</div>
          <div id="importPreviewContent"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeImportModal()">取消</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addCustomerModal">
    <div class="modal">
      <div class="modal-header">添加客户</div>
      <div style="padding:10px;">
        <div class="form-group">
          <label>客户姓名</label>
          <input type="text" id="customerName" placeholder="请输入客户姓名">
        </div>
        <div class="form-group">
          <label>手机号码</label>
          <input type="tel" id="customerPhone" placeholder="请输入手机号码">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="customerEmail" placeholder="请输入邮箱地址">
        </div>
        <div class="form-group">
          <label>微信/QQ</label>
          <input type="text" id="customerWechat" placeholder="请输入微信号或QQ号">
        </div>
        <div class="form-group">
          <label>公司名称</label>
          <input type="text" id="customerCompany" placeholder="请输入公司名称">
        </div>
        <div class="form-group">
          <label>单位地址</label>
          <input type="text" id="customerAddress" placeholder="请输入单位地址">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="customerNote" placeholder="请输入备注信息" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeAddCustomerModal()">取消</button>
        <button class="btn btn-primary" onclick="saveCustomer()">保存</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://anuosapp-production.up.railway.app/api';

    const STORAGE_KEYS = {
      PURCHASES: 'purchases',
      HISTORY: 'purchaseHistory',
      CUSTOMERS: 'customers'
    };

    function loadData(key) {
      try {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : [];
      } catch (e) {
        console.error('读取数据失败:', e);
        return [];
      }
    }

    function saveData(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {
        console.error('保存数据失败:', e);
      }
    }

    async function apiRequest(endpoint, method = 'GET', body = null) {
      try {
        const options = {
          method,
          headers: { 'Content-Type': 'application/json' }
        };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
        const data = await response.json();
        return { data, status: response.status };
      } catch (error) {
        console.error('API 请求失败:', error);
        return { data: null, status: 500, error: error.message };
      }
    }

    function showTab(tabName) {
      document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
      document.querySelector(`a[href="#${tabName}"]`).classList.add('active');
      
      document.querySelectorAll('[id$="Tab"]').forEach(tab => tab.style.display = 'none');
      document.getElementById(`${tabName}Tab`).style.display = 'block';
      
      if (tabName === 'ingredients') renderIngredients();
      if (tabName === 'purchaseList') renderPurchases();
      if (tabName === 'purchaseHistory') renderPurchaseHistory();
      if (tabName === 'customers') renderCustomers();
    }

    function showAddIngredientModal() {
      document.getElementById('ingredientName').value = '';
      document.getElementById('ingredientName').dataset.id = '';
      document.getElementById('ingredientNewCategory').value = '蔬菜';
      document.getElementById('ingredientSpec').value = '';
      document.getElementById('ingredientPrice').value = '';
      document.getElementById('ingredientNote').value = '';
      document.getElementById('addIngredientModal').style.display = 'flex';
    }

    function closeAddIngredientModal() {
      document.getElementById('addIngredientModal').style.display = 'none';
    }

    async function saveIngredientFromForm() {
      const name = document.getElementById('ingredientName').value.trim();
      const category = document.getElementById('ingredientNewCategory').value;
      const spec = document.getElementById('ingredientSpec').value.trim();
      const price = parseFloat(document.getElementById('ingredientPrice').value) || 0;
      const note = document.getElementById('ingredientNote').value.trim();
      const editId = document.getElementById('ingredientName').dataset.id;

      if (!name) {
        alert('请输入食材名称！');
        return;
      }

      const ingredient = {
        name,
        category,
        spec: spec || '-',
        price,
        note: note || '-'
      };

      if (editId) {
        ingredient._id = editId;
      }

      const result = await saveIngredient(ingredient);
      if (result.success) {
        closeAddIngredientModal();
        renderIngredients();
        alert(editId ? '食材更新成功！' : '食材添加成功！');
      } else {
        alert('保存失败，请重试');
      }
    }

    async function loadIngredients() {
      const { data, status } = await apiRequest('/ingredients');
      if (status === 200 && data) {
        return data;
      }
      return [];
    }

    async function saveIngredient(ingredient) {
      if (ingredient._id) {
        const { data, status } = await apiRequest(`/ingredients/${ingredient._id}`, 'PUT', ingredient);
        return { success: status === 200, data };
      } else {
        const { data, status } = await apiRequest('/ingredients', 'POST', ingredient);
        return { success: status === 200, data };
      }
    }

    async function deleteIngredientAPI(id) {
      const { status } = await apiRequest(`/ingredients/${id}`, 'DELETE');
      return status === 200;
    }

    async function importIngredientsBulk(ingredients) {
      const { data, status } = await apiRequest('/ingredients/bulk', 'POST', { ingredients });
      return { success: status === 200, data };
    }

    async function renderIngredients() {
      const search = document.getElementById('ingredientSearch').value.toLowerCase();
      const category = document.getElementById('ingredientCategory').value;

      let ingredients = await loadIngredients();
      const totalCount = ingredients.length;

      ingredients = ingredients.filter(i => {
        const matchSearch = i.name.toLowerCase().includes(search);
        const matchCategory = !category || i.category === category;
        return matchSearch && matchCategory;
      });

      const grid = document.getElementById('ingredientsGrid');
      const filterResult = document.getElementById('filterResult');

      if (search || category) {
        filterResult.style.display = 'block';

    function handleFileSelect() {
      const file = document.getElementById('importFile').files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const arrayBuffer = e.target.result;
        const text = decodeText(arrayBuffer);
        parseFileContent(text);
      };
      
      reader.readAsArrayBuffer(file);
    }

    function decodeText(arrayBuffer) {
      const encodings = ['UTF-8', 'GBK', 'GB2312', 'GB18030', 'Big5'];
      
      for (const encoding of encodings) {
        try {
          const decoder = new TextDecoder(encoding, { fatal: true });
          const text = decoder.decode(arrayBuffer);
          if (!hasInvalidChars(text)) {
            return text;
          }
        } catch (e) {
          continue;
        }
      }
      
      const fallbackDecoder = new TextDecoder('GBK', { fatal: false });
      return fallbackDecoder.decode(arrayBuffer);
    }

    function hasInvalidChars(text) {
      const invalidPattern = /[\uFFFD]/;
      return invalidPattern.test(text);
    }

    async function parseFileContent(text) {
      const lines = text.split('\n').filter(line => line.trim());
      if (lines.length < 2) {
        alert('文件内容为空或格式不正确！');
        return;
      }

      const headers = lines[0].split(',').map(h => h.trim().replace(/["']/g, ''));
      const nameIndex = headers.findIndex(h => h.includes('名称'));
      const categoryIndex = headers.findIndex(h => h.includes('分类'));
      const specIndex = headers.findIndex(h => h.includes('规格'));
      const priceIndex = headers.findIndex(h => h.includes('单价') || h.includes('价格'));
      const noteIndex = headers.findIndex(h => h.includes('备注'));

      if (nameIndex === -1) {
        alert('未找到食材名称列！');
        return;
      }

      const newIngredients = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        const values = parseCSVLine(line);

        const name = values[nameIndex]?.replace(/["']/g, '').trim();
        if (!name) continue;

        newIngredients.push({
          name: name,
          category: values[categoryIndex]?.replace(/["']/g, '').trim() || '其他',
          spec: values[specIndex]?.replace(/["']/g, '').trim() || '-',
          price: parseFloat(values[priceIndex]?.replace(/["']/g, '').trim()) || 0,
          note: values[noteIndex]?.replace(/["']/g, '').trim() || '-'
        });
      }

      if (newIngredients.length === 0) {
        alert('未找到有效数据！');
        return;
      }

      const preview = newIngredients.slice(0, 5).map((item, index) =>
        `<div style="font-size:12px; padding:5px; border-bottom:1px solid #eee;">${index + 1}. ${item.name} - ${item.category} - ¥${item.price.toFixed(2)}</div>`
      ).join('');

      document.getElementById('importPreviewContent').innerHTML = preview;
      document.getElementById('importPreview').style.display = 'block';

      if (!confirm(`确认导入 ${newIngredients.length} 条食材数据？`)) {
        return;
      }

      const result = await importIngredientsBulk(newIngredients);
      if (result.success) {
        closeImportModal();
        renderIngredients();
        alert(`成功导入 ${newIngredients.length} 条食材数据！`);
      } else {
        alert('导入失败，请重试');
      }
    }

    function parseCSVLine(line) {
      const values = [];
      let current = '';
      let inQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          values.push(current);
          current = '';
        } else {
          current += char;
        }
      }
      values.push(current);
      
      return values;
    }

      checkboxes.forEach(cb => {

        const existingPurchase = purchases.find(p => p.name === ingredientName);
        
        if (existingPurchase) {
          const oldTotal = existingPurchase.price * existingPurchase.quantity;
          const newTotal = price * quantity;
          existingPurchase.quantity += quantity;
          existingPurchase.price = (oldTotal + newTotal) / existingPurchase.quantity;
          mergedCount++;
        } else {

    function filterPurchaseHistory() {
      const period = document.getElementById('historyPeriod').value;
      let history = loadData(STORAGE_KEYS.HISTORY);
      
      const today = new Date();
      let filtered = history;
      
      switch (period) {
        case 'today':
          filtered = history.filter(h => {
            const hDate = new Date(h.purchaseDate);
            return hDate.toDateString() === today.toDateString();
          });
          break;
        case '3days':
          filtered = history.filter(h => {
            const hDate = new Date(h.purchaseDate);
            const diffDays = Math.floor((today - hDate) / (1000 * 60 * 60 * 24));
            return diffDays <= 3;
          });
          break;
        case '7days':
          filtered = history.filter(h => {
            const hDate = new Date(h.purchaseDate);
            const diffDays = Math.floor((today - hDate) / (1000 * 60 * 60 * 24));
            return diffDays <= 7;
          });
          break;
        case '15days':
          filtered = history.filter(h => {
            const hDate = new Date(h.purchaseDate);
            const diffDays = Math.floor((today - hDate) / (1000 * 60 * 60 * 24));
            return diffDays <= 15;
          });
          break;
        case 'month':
          filtered = history.filter(h => {
            const hDate = new Date(h.purchaseDate);
            return hDate.getMonth() === today.getMonth() && hDate.getFullYear() === today.getFullYear();
          });
          break;
      }
      
      renderPurchaseHistory(filtered);
    }

      const editId = document.getElementById('customerName').dataset.id;
      
      if (!name) {
        alert('请输入客户姓名！');
        return;
      }
      
      let customers = loadData(STORAGE_KEYS.CUSTOMERS);
      
      if (editId) {
        const index = customers.findIndex(c => c.id === editId);
        if (index !== -1) {
          customers[index] = {
            ...customers[index],
            name,
            phone: phone || '-',
            email: email || '-',
            wechat: wechat || '-',
            company: company || '-',
            address: address || '-',
            note: note || '-'
          };
        }
      } else {
        const maxId = Math.max(...customers.map(c => parseInt(c.id.split('-')[1]) || 0), 0);
        const customerId = 'C-' + (maxId + 1);
        customers.push({
          id: customerId,
          name,
          phone: phone || '-',
          email: email || '-',
          wechat: wechat || '-',
          company: company || '-',
          address: address || '-',
          note: note || '-',
          createdAt: new Date().toLocaleString()
        });
      }
      
      saveData(STORAGE_KEYS.CUSTOMERS, customers);
      closeAddCustomerModal();
      renderCustomers();
      alert(editId ? '客户信息更新成功！' : '客户添加成功！');
    }

    function renderCustomers() {
      const customers = loadData(STORAGE_KEYS.CUSTOMERS);
      const tbody = document.getElementById('customersTable');
      
      if (customers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="padding:30px; text-align:center; color:#999;">暂无客户数据</td></tr>';
        return;
      }
      
      tbody.innerHTML = customers.map((c, index) => `
        <tr style="background:${index % 2 === 0 ? '#ffffff' : '#fafafa'};">
          <td style="padding:12px 15px; border-bottom:1px solid #eee; color:#666;">${c.id}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee; font-weight:bold;">${c.name}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee;">${c.phone}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee;">${c.email}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee;">${c.wechat}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee;">${c.company}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee;">${c.address || '-'}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee; color:#999; font-size:13px;">${c.note}</td>
          <td style="padding:12px 15px; border-bottom:1px solid #eee; display:flex; gap:5px;">
            <button class="btn" style="background:#409EFF; color:white; padding:4px 10px; font-size:12px; border-radius:4px;" onclick="editCustomer('${c.id}')">编辑</button>
            <button class="btn" style="background:#F56C6C; color:white; padding:4px 10px; font-size:12px; border-radius:4px;" onclick="deleteCustomer('${c.id}')">删除</button>
          </td>
        </tr>
      `).join('');
    }

    function editCustomer(id) {
      const customers = loadData(STORAGE_KEYS.CUSTOMERS);
      const customer = customers.find(c => c.id === id);
      
      if (customer) {
        document.getElementById('customerName').value = customer.name;
        document.getElementById('customerName').dataset.id = id;
        document.getElementById('customerPhone').value = customer.phone;
        document.getElementById('customerEmail').value = customer.email;
        document.getElementById('customerWechat').value = customer.wechat;
        document.getElementById('customerCompany').value = customer.company;
        document.getElementById('customerAddress').value = customer.address || '';
        document.getElementById('customerNote').value = customer.note;
        document.getElementById('addCustomerModal').style.display = 'flex';
      }
    }

    function deleteCustomer(id) {
      if (!confirm('确定要删除这个客户吗？')) return;

      let customers = loadData(STORAGE_KEYS.CUSTOMERS);
      customers = customers.filter(c => c.id !== id);
      saveData(STORAGE_KEYS.CUSTOMERS, customers);
      renderCustomers();
      alert('删除成功！');
    }

    renderIngredients();
  </script>
</body>
</html>
