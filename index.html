<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购系统 - 首页</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        h1 { margin-bottom: 20px; }
        a {
            color: #fff;
            text-decoration: underline;
            font-weight: bold;
        }
        .links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .links a {
            display: block;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .links a:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        .badge-mongo {
            background: #4DB33D;
        }
        .badge-supabase {
            background: #409EFF;
        }
        .badge-local {
            background: #E6A23C;
        }
        .description {
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }
        .version-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .version-title {
            font-size: 16px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 采购系统</h1>
        <p class="description">基于 Vue.js + Express + MongoDB 的采购管理平台</p>

        <div class="version-section">
            <div class="version-title">🌐 MongoDB 版本（推荐）</div>
            <div class="links">
                <a href="simple-client-mongodb.html">
                    <strong>✅ 用户端</strong>
                    <span class="badge badge-mongo">MongoDB</span>
                    <p class="description" style="margin:5px 0 0 0;font-size:12px;">连接后端 API，数据存储在 MongoDB Atlas</p>
                </a>
            </div>
        </div>



        <div class="version-section">
            <div class="version-title">🍽️ 食材端</div>
            <div class="links">
                <a href="ingredient-purchase-client.html">
                    <strong>🥗 食材采购端</strong>
                    <span class="badge badge-mongo">MongoDB</span>
                    <p class="description" style="margin:5px 0 0 0;font-size:12px;">食材采购管理，需要后端服务器</p>
                </a>
            </div>
        </div>

        <div class="version-section">
            <div class="version-title">💾 本地版本</div>
            <div class="links">
                <a href="simple-client.html">
                    <strong>⚡ 用户端</strong>
                    <span class="badge badge-local">LocalStorage</span>
                    <p class="description" style="margin:5px 0 0 0;font-size:12px;">无需后端，数据存储在浏览器本地</p>
                </a>
                <a href="simple-merchant.html">
                    <strong>🏪 商家端</strong>
                    <span class="badge badge-local">LocalStorage</span>
                </a>
                <a href="simple-admin.html">
                    <strong>👨‍💼 管理后台</strong>
                    <span class="badge badge-local">LocalStorage</span>
                </a>
            </div>
        </div>

        <div style="margin-top:40px;font-size:12px;opacity:0.7;">
            <p>技术栈: Vue.js | Express | MongoDB Atlas</p>
            <p style="margin-top:10px;">部署平台: GitHub Pages</p>
        </div>
    </div>
</body>
</html>
